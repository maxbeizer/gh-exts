version: 2

builds:
  - main: ./main.go
    binary: gh-exts
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: ['tar.gz']
    format_overrides:
      - goos: windows
        formats: ['zip']

release:
  draft: false
  prerelease: auto
